name: "Feature request"
description: Propose something ProveKit should do.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [docs/ROADMAP_100.md](https://github.com/MobirizerServices/ProveKit/blob/main/docs/ROADMAP_100.md)
        first — it is the live plan, and your idea may already be a numbered item worth
        commenting on (or claiming) rather than a new issue.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do, and what stops you today? Describe the situation, not the solution.
    validations: {required: true}

  - type: textarea
    id: proposal
    attributes:
      label: What you'd like it to do
    validations: {required: true}

  - type: textarea
    id: alternatives
    attributes:
      label: What you do instead today
      description: Workarounds, another tool, or nothing. This is the honest measure of how much it costs you.

  - type: input
    id: roadmap
    attributes:
      label: Related roadmap item
      placeholder: "#33 Versioned docs site"

  - type: checkboxes
    id: help
    attributes:
      label: Would you build it?
      options:
        - label: I'd be up for opening the PR, with guidance on where it goes.
