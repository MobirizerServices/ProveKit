name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        working-directory: backend
        run: ruff check provekit
      - name: Test (with coverage gate)
        working-directory: backend
        run: python -m pytest tests/ -q --cov --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Audit (fail on high/critical advisories)
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  sdk-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No lockfile to cache: the package has zero runtime dependencies, and `npm i` here only
      # fetches the TypeScript compiler and Node types.
      - name: Install build tooling
        working-directory: clients/typescript
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: clients/typescript
        run: npx tsc -p tsconfig.json
      - name: Test
        working-directory: clients/typescript
        run: npx tsc -p tsconfig.test.json && node --test dist-test/test/*.test.js

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build backend image
        run: docker build -t provekit-backend ./backend
      - name: Build frontend image
        run: docker build -t provekit-frontend ./frontend
