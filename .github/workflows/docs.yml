name: Docs

# Builds the MkDocs site (docs/site/mkdocs.yml) so a broken docs build is caught here rather
# than by whoever next tries to render the docs. It PUBLISHES NOTHING — there is no hosted
# ProveKit docs site, no Pages branch, no deploy step. See docs/site/README.md.
#
# No path filter. The site renders the whole docs/ tree and reads the version out of
# backend/pyproject.toml, so a filter would make this skip — and so silently pass — on exactly
# the changes most likely to break it. The job is under a minute.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/site/requirements.txt
      - name: Install the docs toolchain
        # Its own pinned requirements file: rendering docs must never pull a package into the
        # API's environment.
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/site/requirements.txt
      - name: Build (strict)
        # --strict fails on bad YAML, a nav entry pointing at a file that no longer exists, a
        # template error, or a version stamp that can no longer be read. Link and anchor
        # validation is tuned in mkdocs.yml, deliberately not here.
        run: mkdocs build --strict -f docs/site/mkdocs.yml
      - name: Upload the rendered site
        # An artifact, not a deployment: reviewers can download and open it locally. Rendered
        # HTML is never committed — a checked-in copy of the docs starts drifting immediately.
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: build/docs-site
          retention-days: 7
