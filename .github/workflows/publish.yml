# Publish `provekit` to PyPI on a version tag, via Trusted Publishing (OIDC) — no token.
# One-time setup on PyPI (pypi.org -> your account -> Publishing -> "Add a pending publisher"):
#   PyPI Project Name: provekit
#   Owner:             MobirizerServices
#   Repository name:   ProveKit
#   Workflow name:     publish.yml
#   Environment name:  (leave blank)
# Then release with:  git tag v0.1.0 && git push origin v0.1.0
name: publish

on:
  push:
    tags: ["v*"]

jobs:
  # Gate: never publish an untested/failing commit to PyPI (a release is immutable).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        working-directory: backend
        run: ruff check provekit
      - name: Test (with coverage gate)
        working-directory: backend
        run: python -m pytest tests/ -q --cov --cov-report=term-missing

  # Assert the pushed tag matches the packaged version, so v0.2.0 can't ship a 0.1.0 wheel.
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must equal pyproject version
        working-directory: backend
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$TAG pyproject=$PKG"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != pyproject version $PKG"; exit 1; }

  pypi:
    needs: [test, version-check]        # publish only if tests pass AND the version matches
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        working-directory: backend        # pyproject.toml lives here
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist/
