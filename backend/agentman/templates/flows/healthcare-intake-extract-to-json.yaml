version: 1
kind: flow
name: Healthcare Intake · extract to JSON
description: Extract structured fields from a note as JSON.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      note: Patient reports headache and mild fever for two days
- id: ex
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Extract
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: Extract the key fields. Return ONLY valid JSON, null when absent.
    user: 'Extract from: {{input.note}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: JSON
  config:
    value: '{{ex.text}}'
edges:
- id: e-in-ex
  source: in
  target: ex
- id: e-ex-out
  source: ex
  target: out
