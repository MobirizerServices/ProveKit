version: 1
kind: flow
name: Healthcare Intake · tone rewrite
description: Rewrite a note in a warm, professional tone.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      note: Patient reports headache and mild fever for two days
- id: rw
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Rewrite
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: Rewrite the input in a warm, professional tone. Output only the rewrite.
    user: '{{input.note}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Rewritten
  config:
    value: '{{rw.text}}'
edges:
- id: e-in-rw
  source: in
  target: rw
- id: e-rw-out
  source: rw
  target: out
