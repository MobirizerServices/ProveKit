version: 1
kind: flow
name: Hr · answer
description: Read a feedback, draft a helpful reply.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      feedback: My manager cancels our 1:1s and I feel blocked on growth
- id: ans
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Draft reply
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: You are a concise HR assistant.
    user: '{{input.feedback}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Reply
  config:
    value: '{{ans.text}}'
edges:
- id: e-in-ans
  source: in
  target: ans
- id: e-ans-out
  source: ans
  target: out
