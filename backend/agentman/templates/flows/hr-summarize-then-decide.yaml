version: 1
kind: flow
name: Hr · summarize then decide
description: Summarize a feedback, then branch on whether it needs follow-up.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 200
  data:
    title: Input
  config:
    sample:
      feedback: My manager cancels our 1:1s and I feel blocked on growth
- id: sum
  type: prompt
  position:
    x: 300
    y: 200
  data:
    title: Summarize
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: Summarize in one sentence.
    user: '{{input.feedback}}'
- id: dec
  type: prompt
  position:
    x: 560
    y: 200
  data:
    title: Needs follow-up?
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: 'Answer yes or no: does this need a human follow-up? Reply with only yes or no.'
    user: '{{sum.text}}'
- id: cond
  type: condition
  position:
    x: 820
    y: 200
  data:
    title: Follow up?
  config:
    left: '{{dec.text}}'
    op: contains
    right: 'yes'
- id: y
  type: output
  position:
    x: 1080
    y: 110
  data:
    title: Queue follow-up
  config:
    value: 'follow-up: {{sum.text}}'
- id: n
  type: output
  position:
    x: 1080
    y: 300
  data:
    title: Close
  config:
    value: 'resolved: {{sum.text}}'
edges:
- id: e-in-sum
  source: in
  target: sum
- id: e-sum-dec
  source: sum
  target: dec
- id: e-dec-cond
  source: dec
  target: cond
- id: e-cond-y
  source: cond
  target: y
  condition:
    branch: 'true'
- id: e-cond-n
  source: cond
  target: n
  condition:
    branch: 'false'
