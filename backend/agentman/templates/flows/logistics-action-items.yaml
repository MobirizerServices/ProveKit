version: 1
kind: flow
name: Logistics · action items
description: Turn a shipment into a JSON list of action items.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      shipment: Container held at customs, ETA slipped by four days
- id: ai
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Extract actions
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: List concrete action items as a JSON array of short strings. Only the JSON array.
    user: '{{input.shipment}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Action items
  config:
    value: '{{ai.text}}'
edges:
- id: e-in-ai
  source: in
  target: ai
- id: e-ai-out
  source: ai
  target: out
