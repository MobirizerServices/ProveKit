version: 1
kind: flow
name: Real Estate · answer
description: Read a listing, draft a helpful reply.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      listing: 2BR condo downtown, needs a quick sale, motivated seller
- id: ans
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Draft reply
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: You are a concise real estate assistant.
    user: '{{input.listing}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Reply
  config:
    value: '{{ans.text}}'
edges:
- id: e-in-ans
  source: in
  target: ans
- id: e-ans-out
  source: ans
  target: out
