version: 1
kind: flow
name: Recruiting · triage & route
description: Draft a reply, then route urgent vs normal on a keyword check.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 200
  data:
    title: Input
  config:
    sample:
      resume: 10y backend, led a payments team, Go and Postgres
- id: reply
  type: prompt
  position:
    x: 320
    y: 200
  data:
    title: Draft
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: You are a recruiting assistant. Note anything urgent.
    user: '{{input.resume}}'
- id: cond
  type: condition
  position:
    x: 620
    y: 200
  data:
    title: Urgent?
  config:
    left: '{{reply.text}}'
    op: contains
    right: urgent
- id: human
  type: output
  position:
    x: 900
    y: 110
  data:
    title: Human review
  config:
    value: 'escalate: {{reply.text}}'
- id: auto
  type: output
  position:
    x: 900
    y: 300
  data:
    title: Auto-send
  config:
    value: '{{reply.text}}'
edges:
- id: e-in-reply
  source: in
  target: reply
- id: e-reply-cond
  source: reply
  target: cond
- id: e-cond-human
  source: cond
  target: human
  condition:
    branch: 'true'
- id: e-cond-auto
  source: cond
  target: auto
  condition:
    branch: 'false'
