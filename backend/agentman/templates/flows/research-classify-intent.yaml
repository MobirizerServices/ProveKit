version: 1
kind: flow
name: Research · classify intent
description: Classify a abstract into one label.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      abstract: A new method for retrieval-augmented generation over tables
- id: cls
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Classify
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: 'Classify into exactly one of: urgent, question, complaint, other. Reply with only the label.'
    user: '{{input.abstract}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Label
  config:
    value: '{{cls.text}}'
edges:
- id: e-in-cls
  source: in
  target: cls
- id: e-cls-out
  source: cls
  target: out
