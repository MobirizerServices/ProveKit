version: 1
kind: flow
name: Education · translate & reply
description: Translate a question to English, then draft a reply.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      question: Explain gradient descent to a first-year student
- id: tr
  type: prompt
  position:
    x: 300
    y: 160
  data:
    title: To English
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: Translate the input to English. Output only the translation.
    user: '{{input.question}}'
- id: rep
  type: prompt
  position:
    x: 560
    y: 160
  data:
    title: Reply
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: You are a education assistant.
    user: '{{tr.text}}'
- id: out
  type: output
  position:
    x: 820
    y: 160
  data:
    title: Reply
  config:
    value: '{{rep.text}}'
edges:
- id: e-in-tr
  source: in
  target: tr
- id: e-tr-rep
  source: tr
  target: rep
- id: e-rep-out
  source: rep
  target: out
