version: 1
kind: flow
name: Healthcare Intake · keyword extract
description: Pull the top keywords from a note as a JSON array.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      note: Patient reports headache and mild fever for two days
- id: kw
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Keywords
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: Return a JSON array of the 5 most important keywords. Only the JSON array.
    user: '{{input.note}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Keywords
  config:
    value: '{{kw.text}}'
edges:
- id: e-in-kw
  source: in
  target: kw
- id: e-kw-out
  source: kw
  target: out
