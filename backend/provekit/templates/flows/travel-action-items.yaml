version: 1
kind: flow
name: Travel · action items
description: Turn a request into a JSON list of action items.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      request: Cheapest flight NYC to Lisbon in the first week of May
- id: ai
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Extract actions
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: List concrete action items as a JSON array of short strings. Only the JSON array.
    user: '{{input.request}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Action items
  config:
    value: '{{ai.text}}'
edges:
- id: e-in-ai
  source: in
  target: ai
- id: e-ai-out
  source: ai
  target: out
