[project]
name = "provekit"
version = "0.1.0"
description = "Prove your agent works — test any AI agent (LLM/MCP/HTTP/A2A) and run the suite in CI."
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "ProveKit contributors" }]
keywords = ["agent", "llm", "testing", "evals", "mcp", "ci", "prompt", "openai", "anthropic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "fastapi==0.115.6",
    "uvicorn[standard]==0.34.0",
    "sqlalchemy==2.0.36",
    "pydantic==2.10.4",
    "pydantic-settings==2.7.1",
    "httpx==0.28.1",
    "jsonschema==4.23.0",
    "cryptography==49.0.0",
    "pyyaml==6.0.3",
    "alembic==1.18.5",
    "psycopg[binary]==3.3.4",
    "email-validator==2.2.0",
    "redis==5.2.1",
    "sentry-sdk[fastapi]==2.20.0",
]

[project.urls]
Homepage = "https://github.com/MobirizerServices/ProveKit"
Repository = "https://github.com/MobirizerServices/ProveKit"
Issues = "https://github.com/MobirizerServices/ProveKit/issues"

[project.scripts]
provekit = "provekit.cli:main"

[project.optional-dependencies]
# Keep in sync with requirements-dev.txt — CI gates on both pytest and ruff.
dev = ["pytest==9.1.1", "ruff==0.9.2"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["provekit", "provekit.routers", "provekit.services", "provekit.services.providers"]
include-package-data = true

[tool.setuptools.package-data]
provekit = [
    # the bundled flow-template gallery (served by the New-flow picker)
    "templates/flows/*.yaml",
    "templates/flows/_manifest.json",
    # the Alembic migrations — the app runs `upgrade head` on startup, so a wheel
    # install that omitted these could not boot against a persistent database.
    "migrations/env.py",
    "migrations/script.py.mako",
    "migrations/versions/*.py",
]

[tool.coverage.run]
source = ["provekit"]
# Migrations are one-shot schema DDL replayed by Alembic, not application logic; they live
# inside the package so wheels ship them, which would otherwise drag them into the report.
omit = ["provekit/migrations/*"]

[tool.coverage.report]
# CI gates on this: a PR that drops tests or adds uncovered code fails. Set below the
# current ~99% to leave headroom for cross-interpreter variance, not so low it's toothless.
fail_under = 90
show_missing = true

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# Lenient set: pyflakes (F) catches real bugs (undefined names, etc.) and a subset
# of pycodestyle (E). We relax a few purely-stylistic rules the current code trips:
#   E501 - long lines (line-length is advisory here, not enforced)
#   E702 - multiple statements on one line (semicolons); a deliberate style choice
#   F401 - unused imports (a couple of re-export/placeholder imports)
# Import sorting (I) is intentionally left out of the select set for the same reason.
select = ["E", "F"]
ignore = ["E501", "E702", "F401"]
