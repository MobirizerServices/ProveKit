# Production stack: Caddy (TLS) → frontend + backend, Postgres, Redis.
# Bring up:  DOMAIN=provekit.example.com SECRET_KEY=... docker compose -f compose.prod.yml up -d --build
# No service ports are published except Caddy's 80/443.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?set DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: provekit
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      POSTGRES_DB: provekit
    volumes:
      - provekit-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provekit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    command: ["uvicorn", "provekit.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4",
              "--proxy-headers", "--forwarded-allow-ips=*"]
    environment:
      HOSTED: "true"
      DATABASE_URL: "postgresql+psycopg://provekit:${POSTGRES_PASSWORD:?}@db:5432/provekit"
      REDIS_URL: "redis://redis:6379/0"          # global rate-limit windows across the workers
      SECRET_KEY: "${SECRET_KEY:?set SECRET_KEY}"
      CORS_ORIGINS: "https://${DOMAIN}"
      WEB_BASE_URL: "https://${DOMAIN}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      # Email (password reset / verification). Without SMTP_HOST the links are logged, not sent.
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      # Tunable quotas (defaults are sensible): trace-ingest rate + span retention.
      INGEST_RATE_PER_MIN: "${INGEST_RATE_PER_MIN:-600}"
      RUNS_RETENTION: "${RUNS_RETENTION:-10000}"
      # Bootstrap the /admin console for this account, larger uploads, optional PII masking.
      SUPERUSER_EMAILS: "${SUPERUSER_EMAILS:-}"
      MAX_BODY_BYTES: "${MAX_BODY_BYTES:-25000000}"
      REDACT_PII: "${REDACT_PII:-false}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the standalone build. Caddy routes /api + /v1 straight to the backend,
        # so this is only a fallback for same-origin calls that reach the Next server.
        API_PROXY_TARGET: "http://backend:8000"
    environment:
      # Turns on the middleware login gate: portal routes redirect to /login without a session.
      HOSTED: "true"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  provekit-pg:
  caddy-data:
  caddy-config:
