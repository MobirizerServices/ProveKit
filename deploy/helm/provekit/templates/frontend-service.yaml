apiVersion: v1
kind: Service
metadata:
  name: {{ include "provekit.frontend.fullname" . }}
  labels:
    {{- include "provekit.componentLabels" (dict "ctx" . "component" "frontend") | nindent 4 }}
  {{- if or .Values.frontend.service.annotations .Values.commonAnnotations }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.frontend.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "provekit.selectorLabels" (dict "ctx" . "component" "frontend") | nindent 4 }}
