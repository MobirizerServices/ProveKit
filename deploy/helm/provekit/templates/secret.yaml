{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{/*
Only the backend mounts this Secret — the frontend gets explicit env vars instead, so the
database URL and SECRET_KEY never reach the Next.js pods.

HOSTED=true refuses to boot with a weak/unset SECRET_KEY (main.py::_guard_production_config),
so fail at template time with a readable message rather than in a CrashLoopBackOff.
*/}}
{{- if and .Values.config.hosted (lt (len (trim .Values.secrets.secretKey)) 16) }}
{{- fail "secrets.secretKey must be at least 16 characters when config.hosted=true. Generate one: python3 -c \"import secrets; print(secrets.token_urlsafe(48))\"" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "provekit.secretName" . }}
  labels:
    {{- include "provekit.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  DATABASE_URL: {{ include "provekit.databaseUrl" . | quote }}
  REDIS_URL: {{ include "provekit.redisUrl" . | quote }}
  {{- with .Values.secrets.sentryDsn }}
  SENTRY_DSN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smtpPassword }}
  SMTP_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- range $k, $v := .Values.secrets.extra }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
