{{- if .Values.serviceAccount.create }}
{{/* Neither component talks to the Kubernetes API, so the token stays unmounted by default. */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "provekit.serviceAccountName" . }}
  labels:
    {{- include "provekit.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations .Values.commonAnnotations }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
