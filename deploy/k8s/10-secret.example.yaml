# Copy to 10-secret.yaml, fill in real values, and apply it. This file is an example — the
# placeholders below are not usable, and the backend refuses to boot with HOSTED=true and a
# weak SECRET_KEY (backend/provekit/main.py::_guard_production_config).
#
# Prefer creating it without a file on disk:
#
#   kubectl -n provekit create secret generic provekit-secrets \
#     --from-literal=SECRET_KEY="$(python3 -c 'import secrets;print(secrets.token_urlsafe(48))')" \
#     --from-literal=DATABASE_URL='postgresql+psycopg://provekit:CHANGE_ME@postgres:5432/provekit' \
#     --from-literal=REDIS_URL='redis://redis:6379/0'
#
#   kubectl -n provekit create secret generic provekit-postgres \
#     --from-literal=POSTGRES_USER=provekit \
#     --from-literal=POSTGRES_DB=provekit \
#     --from-literal=POSTGRES_PASSWORD='CHANGE_ME'
#
# The password inside DATABASE_URL must match POSTGRES_PASSWORD, and must be URL-safe (or
# percent-encoded) because it is part of a URL.
apiVersion: v1
kind: Secret
metadata:
  name: provekit-secrets
  namespace: provekit
type: Opaque
stringData:
  # >=16 chars. Signs sessions and derives the key material that seals provider credentials
  # at rest. Rotating it logs everyone out; it does not lose stored data.
  #   python3 -c "import secrets; print(secrets.token_urlsafe(48))"
  SECRET_KEY: "CHANGE_ME_GENERATE_A_LONG_RANDOM_STRING"
  DATABASE_URL: "postgresql+psycopg://provekit:CHANGE_ME_DB_PASSWORD@postgres:5432/provekit"
  # Optional but strongly recommended: without it, rate-limit windows, playground spend
  # counters and monthly span quotas are per-worker and reset on restart.
  REDIS_URL: "redis://redis:6379/0"
  # Optional.
  # SENTRY_DSN: ""
  # SMTP_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: provekit-postgres
  namespace: provekit
type: Opaque
stringData:
  POSTGRES_USER: "provekit"
  POSTGRES_DB: "provekit"
  POSTGRES_PASSWORD: "CHANGE_ME_DB_PASSWORD"
