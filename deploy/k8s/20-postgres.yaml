# Postgres for a self-hosted ProveKit. One replica, one volume, no replication and no
# backups — enough to get the stack running, not enough to be your production database.
# Delete this file and point DATABASE_URL at a managed instance when the data matters.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: provekit
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: provekit
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: provekit
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: provekit
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: provekit
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: provekit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: provekit
    spec:
      securityContext:
        runAsUser: 70            # the `postgres` user in the alpine image
        runAsGroup: 70
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            # A subdirectory, not the mount root: many storage classes leave a lost+found
            # behind and initdb refuses a non-empty data directory.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: provekit-postgres
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "provekit"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "provekit"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
        # storageClassName: <your class>   # omitted -> the cluster default
