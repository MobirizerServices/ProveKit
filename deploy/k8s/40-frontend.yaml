# ProveKit portal — Next.js standalone server on port 3000. (docker-compose.yml publishes it
# on host port 3001; the container has always listened on 3000.)
#
# It deliberately does not mount provekit-secrets: the portal needs HOSTED and a port, not the
# database URL or SECRET_KEY.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: provekit
  labels:
    app.kubernetes.io/name: provekit-frontend
    app.kubernetes.io/part-of: provekit
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app.kubernetes.io/name: provekit-frontend
    app.kubernetes.io/part-of: provekit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: provekit
  labels:
    app.kubernetes.io/name: provekit-frontend
    app.kubernetes.io/part-of: provekit
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: provekit-frontend
      app.kubernetes.io/part-of: provekit
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provekit-frontend
        app.kubernetes.io/part-of: provekit
    spec:
      automountServiceAccountToken: false
      securityContext:
        # uid 1000 = the `node` user the frontend image runs as.
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: frontend
          image: provekit-frontend:latest      # CHANGE ME
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # Activates the middleware login gate: portal routes redirect to /login without a
            # session cookie (frontend/middleware.ts). Keep it in step with HOSTED in
            # provekit-config.
            - name: HOSTED
              value: "true"
            # Server-rendered metadata base. NEXT_PUBLIC_* values referenced from client
            # components are inlined at image build time — set those with --build-arg.
            - name: NEXT_PUBLIC_SITE_URL
              value: "https://provekit.example.com"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
