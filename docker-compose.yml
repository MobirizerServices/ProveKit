# AgentMan — run backend + frontend together.
#   OPENAI_API_KEY=sk-… docker compose up --build
# Then open http://localhost:3001
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agentman
      POSTGRES_PASSWORD: agentman
      POSTGRES_DB: agentman
    volumes:
      - agentman-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentman"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: "postgresql+psycopg://agentman:agentman@db:5432/agentman"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "${SECRET_KEY:-dev-only-change-me}"
      CORS_ORIGINS: "http://localhost:3001"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the standalone build: the Next server proxies /api and /v1 here.
        API_PROXY_TARGET: "http://backend:8100"
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  agentman-pg:
