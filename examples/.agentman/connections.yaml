# Copy this to your project's .agentman/connections.yaml and fill in real values.
# Secrets use ${ENV_VAR} — they are read from the environment at run time and never
# stored in your test files.
connections:
  OpenAI:
    provider: openai
    api_key: ${OPENAI_API_KEY}
    models: [gpt-4o-mini, gpt-4o]

  OpenAI Responses:
    provider: openai-responses
    api_key: ${OPENAI_API_KEY}
    models: [gpt-4o-mini]

  Anthropic:
    provider: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    models: [claude-sonnet-4-5, claude-haiku-4-5-20251001]

  Local MCP:
    url: http://127.0.0.1:8765/mcp
    spec: auto            # or 2025-11-25 (stateful) / 2026-07-28 (stateless)

  Stdio MCP:
    command: python
    args: [my_mcp_server.py]

  My HTTP agent:
    base_url: http://127.0.0.1:8000
    headers: { Authorization: "Bearer ${AGENT_TOKEN}" }
