version: 1
kind: flow
name: E-Commerce · answer
description: Read a review, draft a helpful reply.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      review: Arrived a day late but the quality is excellent, 5 stars
- id: ans
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Draft reply
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: You are a concise e-commerce assistant.
    user: '{{input.review}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Reply
  config:
    value: '{{ans.text}}'
edges:
- id: e-in-ans
  source: in
  target: ans
- id: e-ans-out
  source: ans
  target: out
