version: 1
kind: flow
name: Gaming Support · answer
description: Read a report, draft a helpful reply.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      report: Got disconnected mid-match and lost my rank points
- id: ans
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Draft reply
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: You are a concise gaming support assistant.
    user: '{{input.report}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Reply
  config:
    value: '{{ans.text}}'
edges:
- id: e-in-ans
  source: in
  target: ans
- id: e-ans-out
  source: ans
  target: out
