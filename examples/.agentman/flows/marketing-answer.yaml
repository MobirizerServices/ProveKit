version: 1
kind: flow
name: Marketing · answer
description: Read a brief, draft a helpful reply.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      brief: Launch email for a privacy-first note-taking app
- id: ans
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Draft reply
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: You are a concise marketing assistant.
    user: '{{input.brief}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Reply
  config:
    value: '{{ans.text}}'
edges:
- id: e-in-ans
  source: in
  target: ans
- id: e-ans-out
  source: ans
  target: out
