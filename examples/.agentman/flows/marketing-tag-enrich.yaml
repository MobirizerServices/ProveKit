version: 1
kind: flow
name: Marketing · tag & enrich
description: Produce a JSON list of topic tags for a brief.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      brief: Launch email for a privacy-first note-taking app
- id: tag
  type: prompt
  position:
    x: 340
    y: 160
  data:
    title: Tag
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: Return a JSON array of 3 short topic tags for the input. Only the JSON array.
    user: '{{input.brief}}'
- id: out
  type: output
  position:
    x: 640
    y: 160
  data:
    title: Tags
  config:
    value: '{{tag.text}}'
edges:
- id: e-in-tag
  source: in
  target: tag
- id: e-tag-out
  source: tag
  target: out
