version: 1
kind: flow
name: Research · redact & summarize
description: Redact personal data from a abstract, then summarize the rest.
nodes:
- id: in
  type: input
  position:
    x: 40
    y: 160
  data:
    title: Input
  config:
    sample:
      abstract: A new method for retrieval-augmented generation over tables
- id: red
  type: prompt
  position:
    x: 300
    y: 160
  data:
    title: Redact PII
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: Replace names, emails, phone numbers, and card numbers with [REDACTED]. Output only the redacted
      text.
    user: '{{input.abstract}}'
- id: sum
  type: prompt
  position:
    x: 560
    y: 160
  data:
    title: Summarize
  config:
    connection: Demo Assistant (mock)
    model: demo-mock
    system: Summarize in one sentence.
    user: '{{red.text}}'
- id: out
  type: output
  position:
    x: 820
    y: 160
  data:
    title: Safe summary
  config:
    value: '{{sum.text}}'
edges:
- id: e-in-red
  source: in
  target: red
- id: e-red-sum
  source: red
  target: sum
- id: e-sum-out
  source: sum
  target: out
