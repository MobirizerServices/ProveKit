version: 1
kind: test
name: Structured extraction returns valid JSON
connection: OpenAI
request:
  type: prompt
  model: gpt-4o-mini
  system: Extract the requested fields. Return ONLY valid JSON, no prose. Use null when absent.
  user: "Extract name, email, and priority from: {{text}}"
assertions:
  - type: json_schema
    schema:
      type: object
      required: [name, email, priority]
dataset:
  - name: full record
    variables: {text: "Ada Lovelace, ada@example.com, this is blocking us — high priority"}
