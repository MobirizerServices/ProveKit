version: 1
kind: test
name: Inventory tool returns a known status
connection: Local MCP
request:
  type: tool
  tool: check_inventory
  args: { product: "{{product}}" }
assertions:
  - type: json_path
    path: status
    value: in_stock
  - type: tool_called
    value: check_inventory
dataset:
  - name: stocked product
    variables: { product: "Berge" }
