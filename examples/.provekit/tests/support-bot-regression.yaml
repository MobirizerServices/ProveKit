version: 1
kind: test
name: Support bot regression
connection: OpenAI
request:
  type: prompt
  model: gpt-4o-mini
  system: You are a concise customer-support assistant. Escalate anything urgent to a human.
  user: "{{message}}"
assertions:
  - type: llm_judge
    criteria: The reply is polite and directly addresses the customer's issue.
    connection: OpenAI
  - type: latency_lt
    value: 8000
dataset:
  - name: refund, urgent
    variables: {message: "URGENT: my order never arrived and I want a refund now"}
  - name: plan question
    variables: {message: "How do I upgrade my plan?"}
  - name: password reset
    variables: {message: "I can't log in, how do I reset my password?"}
